name: 每日抓取股市数据

on:
  schedule:
    # 时间为 UTC。对应北京/香港时间(+8) 与 美东(-4/-5)
    - cron: "30 7 * * 1-5"    # 15:30 北京 — A股收盘后
    - cron: "0 8 * * 1-5"     # 16:00 香港 — 港股收盘后
    - cron: "0 13 * * 1-5"    # 09:00 美东 — 美股开盘前后
  workflow_dispatch:           # 允许手动触发

permissions:
  contents: write              # 需要写权限才能 commit 回仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取数据
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python fetch_data.py

      - name: 提交更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "data: 自动更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
