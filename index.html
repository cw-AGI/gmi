<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMI · 全球股市情报</title>
<style>
  :root{
    --bg:#0a0e13; --bg2:#0d1219; --surface:#121a23; --surface2:#16202b;
    --line:#1e2a36; --line2:#26333f;
    --text:#e6edf3; --muted:#7d8da0; --faint:#566374;
    --amber:#f5a623; --teal:#2dd4bf;
    --up:#ef4444; --down:#22c55e;        /* 红涨绿跌（中文习惯） */
    --mono:"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,"Courier New",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}

  /* ===== Header ===== */
  header{display:flex;align-items:center;gap:14px;padding:14px 20px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg2),var(--bg));
    position:sticky;top:0;z-index:20}
  .logo{display:flex;align-items:baseline;gap:9px}
  .logo b{font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:2px;
    background:linear-gradient(135deg,var(--amber),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo span{font-size:12px;color:var(--muted);letter-spacing:.5px}
  .spacer{flex:1}
  .meta{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:right;line-height:1.5}
  .meta .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--down);margin-right:5px;
    box-shadow:0 0 7px var(--down);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .langbtn{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line2);
    background:var(--surface);padding:6px 11px;border-radius:7px;cursor:pointer;letter-spacing:1px;transition:.15s}
  .langbtn:hover{color:var(--text);border-color:var(--teal)}

  /* ===== Ticker tape (signature) ===== */
  .tape{overflow:hidden;border-bottom:1px solid var(--line);background:var(--bg2);white-space:nowrap;position:relative}
  .tape-track{display:inline-flex;align-items:center;padding:9px 0;animation:scroll 38s linear infinite;will-change:transform}
  .tape:hover .tape-track{animation-play-state:paused}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .tick{display:inline-flex;align-items:baseline;gap:7px;padding:0 22px;font-family:var(--mono);font-size:13px;
    border-right:1px solid var(--line)}
  .tick .nm{color:var(--muted);font-size:11px}
  .tick .vl{color:var(--text);font-weight:600}
  .tick .pc{font-size:12px}

  /* ===== Market tabs ===== */
  nav.markets{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg);overflow-x:auto}
  nav.markets button{font-family:var(--sans);font-size:14px;color:var(--muted);background:none;border:none;
    padding:14px 18px;cursor:pointer;position:relative;white-space:nowrap;transition:.15s;font-weight:500}
  nav.markets button .flag{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:6px}
  nav.markets button:hover{color:var(--text)}
  nav.markets button.on{color:var(--text)}
  nav.markets button.on::after{content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:2px;
    background:linear-gradient(90deg,var(--amber),var(--teal));border-radius:2px}

  /* ===== Grid of 4 panels ===== */
  main{flex:1;padding:18px;display:grid;gap:14px;
    grid-template-columns:0.85fr 1.15fr 1fr 1fr;align-items:start;max-width:1680px;margin:0 auto;width:100%}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;
    display:flex;flex-direction:column;min-height:240px}
  .ph{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--line);background:var(--surface2)}
  .ph .ic{width:7px;height:18px;border-radius:2px}
  .ph h2{font-size:13px;font-weight:600;letter-spacing:.5px}
  .ph .cnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .pb{padding:6px;overflow-y:auto;max-height:72vh}
  .pb::-webkit-scrollbar{width:7px}.pb::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

  /* index rows */
  .idx{display:flex;align-items:center;padding:11px 10px;border-radius:8px;transition:.12s}
  .idx:hover{background:var(--surface2)}
  .idx .nm{font-size:13px;flex:1}
  .idx .nm small{display:block;color:var(--faint);font-family:var(--mono);font-size:10px;margin-top:2px;letter-spacing:.5px}
  .idx .rt{text-align:right;font-family:var(--mono)}
  .idx .rt .v{font-size:15px;font-weight:600}
  .idx .rt .c{font-size:11px;margin-top:2px}

  /* news rows */
  .news{display:block;padding:10px;border-radius:8px;transition:.12s;border-left:2px solid transparent}
  .news:hover{background:var(--surface2);border-left-color:var(--teal)}
  .news.read{opacity:.5}
  .news .tm{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:.5px}
  .news .ti{font-size:13px;line-height:1.45;margin:3px 0;color:var(--text)}
  .news .sm{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .news .sr{font-size:10px;color:var(--faint);margin-top:4px}

  /* corporate rows */
  .corp{display:flex;gap:9px;padding:10px;border-radius:8px;transition:.12s}
  .corp:hover{background:var(--surface2)}
  .tag{flex-shrink:0;font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:5px;height:fit-content;
    letter-spacing:.5px;border:1px solid var(--line2)}
  .tag.earn{color:var(--teal);border-color:#1d4b46;background:#0f1e1c}
  .tag.note{color:var(--amber);border-color:#4d3a16;background:#1f1809}
  .tag.deal{color:#a78bfa;border-color:#3d2f5e;background:#171326}
  .corp .bd{flex:1}
  .corp .bd .t{font-size:12.5px;line-height:1.4}
  .corp .bd .m{font-size:10px;color:var(--faint);font-family:var(--mono);margin-top:3px}

  /* ipo rows */
  .ipo{padding:11px 10px;border-radius:8px;transition:.12s;border-bottom:1px solid var(--line)}
  .ipo:last-child{border-bottom:none}
  .ipo:hover{background:var(--surface2)}
  .ipo .top{display:flex;align-items:baseline;gap:8px}
  .ipo .nm{font-size:13px;font-weight:600;flex:1}
  .ipo .cd{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .ipo .row{display:flex;gap:14px;margin-top:6px;font-family:var(--mono);font-size:11px}
  .ipo .row b{color:var(--faint);font-weight:400;margin-right:4px}
  .ipo .row .pr{color:var(--amber)}
  .ipo .mk{font-size:10px;color:var(--teal)}

  /* sector filter bar */
  .sectors{display:flex;gap:8px;padding:11px 18px;border-bottom:1px solid var(--line);
    background:var(--bg2);overflow-x:auto;align-items:center}
  .sectors .lab{font-size:11px;color:var(--faint);font-family:var(--mono);letter-spacing:.5px;flex-shrink:0;margin-right:2px}
  .chip{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line2);
    padding:6px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:6px}
  .chip:hover{color:var(--text)}
  .chip .pip{width:7px;height:7px;border-radius:50%}
  .chip.on{color:#0a0e13;font-weight:600;border-color:transparent}

  /* sector pills on items */
  .pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
  .pill{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:4px;letter-spacing:.5px;
    border:1px solid;background:transparent;line-height:1.5}

  /* A股 hot boards strip */
  .boards{border-top:1px dashed var(--line2);margin-top:4px;padding:10px}
  .boards .bt{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:.5px;margin-bottom:7px}
  .boards .bwrap{display:flex;gap:6px;flex-wrap:wrap}
  .bchip{font-size:11px;font-family:var(--mono);padding:4px 9px;border-radius:6px;background:var(--surface2);
    border:1px solid var(--line2);display:flex;gap:6px;align-items:center}

  .empty{padding:40px 16px;text-align:center;color:var(--faint);font-size:12px;line-height:1.7}

  footer{padding:14px 20px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);
    display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-family:var(--mono)}
  footer .src{color:var(--muted)}

  @media(max-width:1100px){
    main{grid-template-columns:1fr 1fr}
  }
  @media(max-width:640px){
    main{grid-template-columns:1fr;padding:12px}
    header{padding:12px 14px}.logo b{font-size:18px}
    .meta{font-size:10px}
  }
  @media(prefers-reduced-motion:reduce){
    .tape-track{animation:none}.meta .dot{animation:none}
  }
</style>
</head>
<body>
<header>
  <div class="logo"><b>GMI</b><span data-i="subtitle">全球股市情报终端</span></div>
  <div class="spacer"></div>
  <div class="meta"><span class="dot"></span><span data-i="live">实时</span> · <span data-i="updated">更新</span> <span id="upd">—</span></div>
  <button class="langbtn" id="lang" onclick="toggleLang()">中 / EN</button>
</header>

<div class="tape"><div class="tape-track" id="tape"></div></div>

<nav class="markets" id="tabs"></nav>

<div class="sectors" id="sectorbar"></div>

<main id="grid"></main>

<footer>
  <span data-i="disclaimer">数据来自公开免费源，仅供参考，可能存在延迟</span>
  <span class="spacer" style="flex:1"></span>
  <span class="src">美股: Finnhub</span>
  <span class="src">A股/港股: 东方财富 via akshare</span>
</footer>

<script>
/* ============================================================
   GMI — 全球股市情报终端
   单文件 · 零依赖 · 中英双语 · localStorage · 红涨绿跌
   数据：构建后由 GitHub Actions 写入 ./data/{cn,hk,us}.json
   下方 SAMPLE 为内置兜底，离线/抓取失败时仍可渲染
   ============================================================ */

/* ---------- i18n ---------- */
const I18N = {
  zh:{ subtitle:"全球股市情报终端", live:"实时", updated:"更新", disclaimer:"数据来自公开免费源，仅供参考，可能存在延迟",
       indices:"指数概览", news:"每日新闻", corporate:"企业动态", ipo:"新股计划",
       all:"全部", empty:"暂无数据 — 等待下一次抓取" },
  en:{ subtitle:"Global Market Intelligence", live:"LIVE", updated:"Updated", disclaimer:"Free public data sources, for reference only, may be delayed",
       indices:"Indices", news:"Daily News", corporate:"Corporate", ipo:"IPO Calendar",
       all:"All", empty:"No data yet — waiting for next fetch" }
};
let lang = localStorage.getItem("gmi_lang") || "zh";
const t = k => (I18N[lang][k] ?? k);
function L(zh,en){ return lang==="zh" ? (zh||en||"") : (en||zh||""); }

/* ---------- markets ---------- */
const MARKETS = [
  {id:"cn", zh:"A股",  en:"China A", flag:"SH·SZ"},
  {id:"hk", zh:"港股", en:"Hong Kong", flag:"HKEX"},
  {id:"us", zh:"美股", en:"US", flag:"NYSE·NASDAQ"}
];
let active = localStorage.getItem("gmi_market") || "cn";
let DATA = {};
let readSet = new Set(JSON.parse(localStorage.getItem("gmi_read")||"[]"));

/* ---------- 关注赛道 ---------- */
const SECTOR_META = {
  ai:    {zh:"AI产业",en:"AI",     color:"#2dd4bf"},
  tech:  {zh:"科技",  en:"Tech",   color:"#60a5fa"},
  comm:  {zh:"通信",  en:"Comms",  color:"#f5a623"},
  energy:{zh:"能源",  en:"Energy", color:"#34d399"},
  space: {zh:"太空",  en:"Space",  color:"#a78bfa"},
  bio:   {zh:"生物科学",en:"Bio",  color:"#f472b6"}
};
const SECTOR_ORDER = ["ai","tech","comm","energy","space","bio"];
let activeSector = localStorage.getItem("gmi_sector") || "all";

/* ---------- helpers ---------- */
const pct = n => (n>0?"+":"") + Number(n).toFixed(2) + "%";
const dirColor = n => n>0 ? "var(--up)" : n<0 ? "var(--down)" : "var(--muted)";
const arrow = n => n>0 ? "▲" : n<0 ? "▼" : "—";

/* ---------- render ---------- */
function renderTabs(){
  document.getElementById("tabs").innerHTML = MARKETS.map(m=>
    `<button class="${m.id===active?'on':''}" onclick="setMarket('${m.id}')">${L(m.zh,m.en)}<span class="flag">${m.flag}</span></button>`
  ).join("");
}
function setMarket(id){ active=id; localStorage.setItem("gmi_market",id); renderTabs(); renderGrid(); }

/* ---------- 赛道筛选条 ---------- */
function renderSectorBar(){
  const chip = (id,on)=>{
    const m = id==="all" ? {zh:"全部",en:"All",color:"#7d8da0"} : SECTOR_META[id];
    const style = on ? `background:${m.color};` : "";
    const pip = id==="all" ? "" : `<span class="pip" style="background:${m.color}"></span>`;
    return `<button class="chip ${on?'on':''}" style="${style}" onclick="setSector('${id}')">${pip}${L(m.zh,m.en)}</button>`;
  };
  document.getElementById("sectorbar").innerHTML =
    `<span class="lab">${L('赛道','SECTOR')}</span>`+
    chip("all", activeSector==="all")+
    SECTOR_ORDER.map(id=>chip(id, activeSector===id)).join("");
}
function setSector(id){ activeSector=id; localStorage.setItem("gmi_sector",id); renderSectorBar(); renderGrid(); }

/* 赛道标签小药丸 */
function pills(arr){
  if(!arr||!arr.length) return "";
  return `<div class="pills">`+arr.filter(s=>SECTOR_META[s]).map(s=>{
    const m=SECTOR_META[s];
    return `<span class="pill" style="color:${m.color};border-color:${m.color}66">${L(m.zh,m.en)}</span>`;
  }).join("")+`</div>`;
}
/* 按当前赛道筛选 */
function inSector(item){ return activeSector==="all" || (item.sectors||[]).includes(activeSector); }

function renderTape(){
  const items=[];
  ["cn","hk","us"].forEach(m=>(DATA[m]?.indices||[]).forEach(ix=>items.push(ix)));
  const html = items.map(ix=>
    `<span class="tick"><span class="nm">${L(ix.name_zh,ix.name_en)}</span>`+
    `<span class="vl">${Number(ix.value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>`+
    `<span class="pc" style="color:${dirColor(ix.change_pct)}">${arrow(ix.change_pct)} ${pct(ix.change_pct)}</span></span>`
  ).join("");
  document.getElementById("tape").innerHTML = html + html; // 双份实现无缝滚动
}

function panel(title,color,count,bodyHtml){
  return `<section class="panel"><div class="ph"><span class="ic" style="background:${color}"></span>`+
    `<h2>${title}</h2><span class="cnt">${count}</span></div>`+
    `<div class="pb">${bodyHtml||`<div class="empty">${t('empty')}</div>`}</div></section>`;
}

function renderGrid(){
  const d = DATA[active] || {};
  // 指数（不按赛道筛选，始终全显）+ A股热门板块条
  let idx = (d.indices||[]).map(ix=>
    `<div class="idx"><div class="nm">${L(ix.name_zh,ix.name_en)}<small>${ix.name_en||""}</small></div>`+
    `<div class="rt"><div class="v">${Number(ix.value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>`+
    `<div class="c" style="color:${dirColor(ix.change_pct)}">${arrow(ix.change_pct)} ${(ix.change>0?'+':'')+Number(ix.change).toFixed(2)} (${pct(ix.change_pct)})</div></div></div>`
  ).join("");
  if((d.boards||[]).length){
    const bs = d.boards.filter(b=>activeSector==="all"||(b.sectors||[]).includes(activeSector));
    if(bs.length) idx += `<div class="boards"><div class="bt">${L('关注赛道·热门板块','HOT SECTOR BOARDS')}</div>`+
      `<div class="bwrap">`+bs.map(b=>{
        const c=SECTOR_META[(b.sectors||[])[0]]?.color||"var(--muted)";
        return `<span class="bchip"><span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block"></span>`+
          `${b.name}<b style="color:${dirColor(b.change_pct)}">${pct(b.change_pct)}</b></span>`;
      }).join("")+`</div></div>`;
  }
  // 新闻（赛道筛选）
  const news = (d.news||[]).filter(inSector).map((n,i)=>{
    const id = active+"_n_"+i+"_"+(n.time||"")+(n.title_zh||n.title_en||"").slice(0,12);
    const read = readSet.has(id)?" read":"";
    const link = n.url?` href="${n.url}" target="_blank" rel="noopener"`:"";
    return `<a class="news${read}"${link} onclick="markRead('${id}')">`+
      `<div class="tm">${n.time||""}</div>`+
      `<div class="ti">${L(n.title_zh,n.title_en)}</div>`+
      (n.summary_zh||n.summary_en?`<div class="sm">${L(n.summary_zh,n.summary_en)}</div>`:"")+
      (n.source?`<div class="sr">${n.source}</div>`:"")+pills(n.sectors)+`</a>`;
  }).join("");
  // 企业动态（赛道筛选）
  const tagClass = tg => /业绩|财报|earn/i.test(tg)?"earn":/重组|并购|deal|M&A/i.test(tg)?"deal":"note";
  const corp = (d.corporate||[]).filter(inSector).map(c=>{
    const link = c.url?` href="${c.url}" target="_blank" rel="noopener"`:"";
    return `<a class="corp"${link}><span class="tag ${tagClass(c.tag||'')}">${c.tag||"公告"}</span>`+
      `<div class="bd"><div class="t">${L(c.title_zh,c.title_en)}</div>`+
      `<div class="m">${c.time||""}${c.code?" · "+c.code:""}</div>${pills(c.sectors)}</div></a>`;
  }).join("");
  // 新股（赛道筛选）
  const ipo = (d.ipo||[]).filter(inSector).map(p=>
    `<div class="ipo"><div class="top"><span class="nm">${L(p.name_zh,p.name_en)}</span>`+
    `<span class="cd">${p.code||""}</span></div>`+
    `<div class="row">`+
    (p.date?`<span><b>${L('申购','Date')}</b>${p.date}</span>`:"")+
    (p.price?`<span class="pr"><b style="color:var(--faint)">${L('价格','Price')}</b>${p.price}</span>`:"")+
    `</div>`+(p.market_zh||p.market_en?`<div class="mk">${L(p.market_zh,p.market_en)}</div>`:"")+pills(p.sectors)+`</div>`
  ).join("");

  const cnt = (full,arr)=> activeSector==="all" ? full : arr; // 计数随筛选变化
  document.getElementById("grid").innerHTML =
    panel(t("indices"),"var(--teal)",(d.indices||[]).length,idx)+
    panel(t("news"),"var(--amber)",(d.news||[]).filter(inSector).length,news)+
    panel(t("corporate"),"#a78bfa",(d.corporate||[]).filter(inSector).length,corp)+
    panel(t("ipo"),"var(--up)",(d.ipo||[]).filter(inSector).length,ipo);
}

function markRead(id){ readSet.add(id); localStorage.setItem("gmi_read",JSON.stringify([...readSet].slice(-400))); }

function renderAll(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));
  // 取最新的 updated_at
  let latest=""; ["cn","hk","us"].forEach(m=>{ if(DATA[m]?.updated_at && DATA[m].updated_at>latest) latest=DATA[m].updated_at; });
  document.getElementById("upd").textContent = latest ? new Date(latest).toLocaleString(lang==="zh"?"zh-CN":"en-US",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—";
  renderTabs(); renderSectorBar(); renderTape(); renderGrid();
}
function toggleLang(){ lang = lang==="zh"?"en":"zh"; localStorage.setItem("gmi_lang",lang); renderAll(); }

/* ---------- load data (fetch JSON, fall back to embedded sample) ---------- */
async function load(){
  for(const m of ["cn","hk","us"]){
    try{
      const r = await fetch(`./data/${m}.json?t=`+Date.now());
      if(r.ok){ DATA[m] = await r.json(); continue; }
      throw 0;
    }catch(e){ DATA[m] = SAMPLE[m]; }   // 离线 / 抓取失败兜底
  }
  renderAll();
}

/* ============================================================
   内置示例数据（兜底用，便于直接打开预览；接后端后会被覆盖）
   ============================================================ */
const SAMPLE = {
  cn:{ updated_at:"2026-06-23T15:35:00+08:00",
    indices:[
      {name_zh:"上证指数",name_en:"SSE Composite",value:3287.42,change:14.21,change_pct:0.43},
      {name_zh:"深证成指",name_en:"SZSE Component",value:10612.88,change:-22.4,change_pct:-0.21},
      {name_zh:"创业板指",name_en:"ChiNext",value:2174.55,change:8.9,change_pct:0.41},
      {name_zh:"沪深300",name_en:"CSI 300",value:3902.17,change:6.3,change_pct:0.16}
    ],
    boards:[
